<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Play Reversi against the lab bot." />
    <title>Reversi · Will's Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-reversi" data-theme="life">
    <div class="ambient" aria-hidden="true">
      <div class="mesh"></div>
      <span class="orb orb-a"></span>
      <span class="orb orb-b"></span>
      <span class="orb orb-c"></span>
      <div class="grid-fade"></div>
      <div class="grain"></div>
    </div>

    <div class="reversi-page-shell">
      <header class="reversi-page-header">
        <a href="/" class="reversi-back">← Back to home</a>
        <h1 class="reversi-page-title">Reversi</h1>
        <p class="reversi-page-lead">Play against the bot from the lab engine. It uses minimax with alpha-beta pruning and iterative deepening</p>
      </header>
      <div id="reversiGadgetMount" class="reversi-page-mount"></div>
    </div>

    <script type="module">
      import { mountReversiGadget } from "/js/reversi-gadget.js";
      const mount = document.getElementById("reversiGadgetMount");
      if (mount) mountReversiGadget(mount);
    </script>
  </body>
</html>
